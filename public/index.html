<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notebook LLM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script defer src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="bg-blur bg-one"></div>
    <div class="bg-blur bg-two"></div>

    <main class="container">
      <header class="hero">
        <p class="badge">✨ GenZ-ready notebook AI</p>
        <h1>Notebook LLM</h1>
        <p class="subtitle">Drop your PDFs, docs, sheets & images. Ask anything. Get fast source-grounded snippets.</p>
      </header>

      <section class="card upload-card">
        <div class="card-title-wrap">
          <h2>Upload Knowledge</h2>
          <span class="chip" id="chunkCount">0 chunks</span>
        </div>

        <label for="docs" class="dropzone">
          <input id="docs" type="file" multiple accept=".pdf,.docx,.xlsx,.xls,.csv,.png,.jpg,.jpeg,.webp,.bmp" />
          <span class="drop-title">Click to add files</span>
          <span class="drop-subtitle">PDF · DOCX · XLSX/CSV · PNG/JPG</span>
        </label>

        <div class="actions">
          <button id="processBtn" class="btn-primary">Process files</button>
          <button id="resetBtn" class="btn-secondary">Reset memory</button>
        </div>
        <pre id="uploadResult"></pre>
      </section>

      <section class="card ask-card">
        <h2>Ask your notebook</h2>
        <textarea id="question" rows="4" placeholder="Try: What are the top 3 insights from these documents?"></textarea>
        <button id="askBtn" class="btn-primary full">Ask</button>
        <pre id="answer"></pre>
      </section>
    </main>
  </body>
</html>
